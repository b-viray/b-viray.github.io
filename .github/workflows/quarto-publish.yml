on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # To install LaTeX to build PDF book 
          tinytex: true 
          # uncomment below and fill to pin a version
          # version: 0.9.600
      
      - name: Fetch recent arXiv papers
        run: |
          python3 << 'EOF'
          import urllib.request, xml.etree.ElementTree as ET
          url = ("https://export.arxiv.org/api/query"
                 "?search_query=au:viray_b"
                 "&sortBy=submittedDate&sortOrder=descending&max_results=5")
          ns = "http://www.w3.org/2005/Atom"
          try:
              with urllib.request.urlopen(url) as r:
                  root = ET.fromstring(r.read())
              entries = root.findall(f"{{{ns}}}entry")
              lines = ['<ul style="padding-left:1.1rem; margin:0; font-size:0.9rem; line-height:1.9">']
              for e in entries:
                  title   = e.find(f"{{{ns}}}title").text.strip()
                  link    = e.find(f"{{{ns}}}id").text.strip()
                  authors = ", ".join(a.find(f"{{{ns}}}name").text.strip()
                                      for a in e.findall(f"{{{ns}}}author"))
                  pub  = e.find(f"{{{ns}}}published")
                  date = pub.text.strip()[:7] if pub is not None else ""
                  lines.append(f'<li><a href="{link}">{title}</a><br>'
                               f'<span style="color:#666; font-size:0.82rem">{authors} &mdash; {date}</span></li>')
              lines.append("</ul>")
              with open("_arxiv-recent.html", "w") as f:
                  f.write("\n".join(lines))
              print(f"Wrote {len(entries)} papers to _arxiv-recent.html")
          except Exception as ex:
              print(f"arXiv fetch failed: {ex}")
          EOF

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
